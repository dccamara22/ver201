name: Build Boards

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          submodules: 'recursive'

      - name: Compilar
        uses: espressif/esp-idf-action@v1
        with:
          esp_idf_version: v4.4
          target: esp32
